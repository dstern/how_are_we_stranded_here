# Conda environment file for how_are_we_stranded_here
# Install with: mamba env create -f environment.yml
# Or: conda env create -f environment.yml

name: stranded_here
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - numpy
  - pandas
  - kallisto>=0.44.0
  - rseqc  # Must be from bioconda to get infer_experiment.py in PATH
  - pip
  - pip:
    - git+https://github.com/dstern/how_are_we_stranded_here.git